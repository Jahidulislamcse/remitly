<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Suspended</title>
    
    <!-- Google Font: Hind Siliguri -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">


    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Hind Siliguri', sans-serif;
            color: #333;
        }

        .card {
            background: #cbced4;
            width: 90%;
            max-width: 500px;
            padding: 45px 40px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 6px solid #d32f2f; /* কড়া লাল */
        }

        .icon-container {
            margin-bottom: 25px;
        }

        .icon-container svg {
            width: 65px;
            height: 65px;
            fill: #d32f2f;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #1f2937;
            font-weight: 700;
        }

        .status-badge {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 35px;
            font-size: 13px;
            color: #616264;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- লক আইকন -->
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 1C8.676 1 6 3.676 6 7v3H4v14h16V10h-2V7c0-3.324-2.676-6-6-6zm0 2c2.276 0 4 1.724 4 4v3H8V7c0-2.276 1.724-4 4-4zm0 10c1.104 0 2 .896 2 2s-.896 2-2 2-2-.896-2-2 .896-2 2-2z"/>
            </svg>
        </div>

        <h1>অ্যাপ সাসপেন্ড করা হয়েছে</h1>
        <span class="status-badge">Payment Required</span>

        <!-- মূল মেসেজ -->
        <p><strong>পেমেন্ট না দেওয়ায় আপনার অ্যাপটি স্থগিত করা হয়েছে।</strong></p>
        
        <p>বকেয়া বিল পরিশোধ না করা পর্যন্ত অ্যাপের কোনো ডাটা অ্যাক্সেস করা যাবে না।</p>

        <!-- আপডেট করা সতর্কবার্তা -->
        

        <div class="footer">
            Contact the Developer for assistance.
        </div>
    </div>

</body>
</html>
